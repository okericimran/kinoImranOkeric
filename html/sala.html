<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineMinimum – Sala</title>
  <link rel="stylesheet" href="../css/filmovi.css"/>
  <link rel="stylesheet" href="../css/sala.css"/>
  <style>
    /* ── Navigacija između projekcija ── */
    .proj-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 28px auto 0;
      width: fit-content;
    }

    .btn-proj {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: var(--surface2);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-proj:hover:not(:disabled) {
      background: var(--surface3);
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-proj:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .proj-indicator {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      min-width: 48px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <a href="filmovi.html" class="nav-logo">CineMinimum</a>
    <ul>
      <li><a href="filmovi.html" onclick="sessionStorage.setItem('cinePage','filmovi')">Filmovi</a></li>
      <li><a href="filmovi.html" onclick="sessionStorage.setItem('cinePage','raspored')">Raspored</a></li>
      <li><a href="sala.html" class="active">Sala</a></li>
    </ul>
  </nav>

  <div class="sala-page" id="sala">

    <!-- ════════════════════════
         MAIN – mapa sjedišta
    ════════════════════════ -->
    <div class="sala-main">

      <a href="filmovi.html"
         class="back-btn"
         onclick="sessionStorage.setItem('cinePage','raspored')">
        Nazad na raspored
      </a>

      <!-- Zaglavlje filma – popunjava kinoSala.js -->
      <div class="sala-header">
        <div class="sala-film-title" id="sala-film-name"></div>
        <div class="sala-meta-row">
          <div class="sala-meta-pill">🕐 <strong id="sala-vrijeme"></strong></div>
          <div class="sala-meta-pill">🎬 <strong id="sala-broj"></strong></div>
          <div class="sala-meta-pill">📅 Petak</div>
        </div>
      </div>

      <!-- Platno -->
      <div class="screen-wrap">
        <div class="screen-bar"></div>
        <div class="screen-label">Platno</div>
      </div>

      <!-- Brojevi kolona – popunjava kinoSala.js -->
      <div class="col-numbers" id="col-numbers"></div>

      <!-- Mreža sjedišta – popunjava kinoSala.js -->
      <div class="seat-grid" id="seat-grid"></div>

      <!-- Navigacija između projekcija -->
      <div class="proj-nav">
        <button class="btn-proj" id="btn-prev">← Prethodna</button>
        <span class="proj-indicator" id="proj-indicator">1 / 1</span>
        <button class="btn-proj" id="btn-next">Sljedeća →</button>
      </div>

    </div>

    <!-- ════════════════════════
         SIDEBAR
    ════════════════════════ -->
    <aside class="sala-sidebar">

      <!-- Info o projekciji -->
      <div class="sidebar-section">
        <div class="sidebar-title">Informacije</div>
        <div class="sidebar-film-name" id="sb-film-name"></div>
        <div class="sidebar-film-meta">
          <span>🕐 <strong id="sb-vrijeme"></strong></span>
          <span>🎬 <strong id="sb-sala"></strong></span>
          <span>🎟 Kliknite na sjedište da ga odaberete</span>
        </div>
      </div>

      <!-- Legenda -->
      <div class="sidebar-section">
        <div class="sidebar-title">Legenda</div>
        <div class="legend-list">
          <div class="legend-row">
            <div class="legend-left">
              <div class="legend-seat free"></div>
              <span class="legend-label">Standardno</span>
            </div>
            <span class="legend-price">8 KM</span>
          </div>
          <div class="legend-row">
            <div class="legend-left">
              <div class="legend-seat vip"></div>
              <span class="legend-label">VIP (red C–D)</span>
            </div>
            <span class="legend-price">14 KM</span>
          </div>
          <div class="legend-row">
            <div class="legend-left">
              <div class="legend-seat selected"></div>
              <span class="legend-label">Odabrano</span>
            </div>
            <span class="legend-price">—</span>
          </div>
          <div class="legend-row">
            <div class="legend-left">
              <div class="legend-seat reserved"></div>
              <span class="legend-label">Rezervisano</span>
            </div>
            <span class="legend-price">—</span>
          </div>
          <div class="legend-row">
            <div class="legend-left">
              <div class="legend-seat taken"></div>
              <span class="legend-label">Zauzeto</span>
            </div>
            <span class="legend-price">—</span>
          </div>
        </div>
      </div>

      <!-- Košarica -->
      <div class="sidebar-section" style="flex:1; overflow-y:auto;">
        <div class="sidebar-title">Vaša sjedišta</div>
        <div id="cart-empty" class="cart-empty">Nema odabranih sjedišta</div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-total-row" id="cart-total-row" style="display:none;">
          <span class="cart-total-label">Ukupno</span>
          <span class="cart-total-amount" id="cart-total">0 KM</span>
        </div>
      </div>

      <button class="btn-confirm" id="btn-confirm" disabled>
        Potvrdi rezervaciju
      </button>

    </aside>
  </div>

  <!-- Toast notifikacija -->
  <div class="toast" id="toast"></div>

  <!-- Spirala 2 – JavaScript odvojen od HTML-a -->
  <script src="../scripts/kinoSala.js"></script>
  <script src="../scripts/app.js"></script>

</body>
</html>
